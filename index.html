<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glinding Kopi</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0b0b0b;color:#fff}
section{padding:80px 20px;max-width:1000px;margin:auto}

h1{font-family:'Playfair Display',serif;font-size:3rem;letter-spacing:2px}
h2{font-size:1.8rem;margin-bottom:10px}
p{opacity:.7}

.hero{height:100vh;display:flex;justify-content:center;align-items:center;text-align:center}
.hero h1{font-size:2.5rem}
.hero p{margin:10px 0}

button{padding:12px 24px;background:#c59d5f;border:none;color:#000;font-weight:600;cursor:pointer}

.statement{text-align:center}
.statement h2{font-size:2rem}

.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px}
.card{border:1px solid rgba(255,255,255,0.1);padding:20px}
.card img{width:100%;height:200px;object-fit:cover;margin-bottom:10px}

.cart{position:fixed;right:0;top:0;width:280px;height:100vh;background:#111;padding:20px;overflow:auto}

.footer{text-align:center;opacity:.6}

@media(max-width:768px){
.hero h1{font-size:2rem}
.cart{width:100%;height:auto;position:relative}
}
</style>
</head>

<body>

<section class="hero">
<div>
<h1 contenteditable>FROM BALUN.<br>FOR THE WORLD.</h1>
<p contenteditable>Glinding Kopi</p>
<button onclick="scrollToSection()">Shop Now</button>
</div>
</section>

<section class="statement">
<h2 contenteditable>Rasa utuh. Tanpa distraksi.</h2>
</section>

<section id="products">
<h2>Produk</h2>
<div class="products" id="productList"></div>
</section>

<div class="cart">
<h3>Cart</h3>
<div id="cartItems"></div>
<p id="total">Total: Rp 0</p>
<button onclick="checkout()">Checkout</button>
</div>

<section class="statement">
<h2 contenteditable>Not just coffee. A statement.</h2>
<button onclick="checkout()">Order Now</button>
</section>

<section class="footer">
<p>Glinding Kopi — Balun, Banjarnegara</p>
<p>
<a href="#">IG</a> |
<a href="#">WA</a> |
<a href="#">TikTok</a>
</p>
</section>

<script>
function scrollToSection(){document.getElementById('products').scrollIntoView({behavior:'smooth'})}

let products=[
{name:'Arabica Gayo',price:75000,img:'https://images.unsplash.com/photo-1511920170033-f8396924c348'},
{name:'Robusta Lampung',price:55000,img:'https://images.unsplash.com/photo-1504754524776-8f4f37790ca0'}
];

let cart=[];

function renderProducts(){
let html='';
products.forEach((p,i)=>{
html+=`<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<p>Rp ${p.price}</p>
<button onclick="addToCart(${i})">Add</button>
</div>`;
});
document.getElementById('productList').innerHTML=html;
}

function addToCart(i){
cart.push(products[i]);
renderCart();
}

function renderCart(){
let html='';
let total=0;
cart.forEach(item=>{
html+=`<p>${item.name} - Rp ${item.price}</p>`;
total+=item.price;
});
document.getElementById('cartItems').innerHTML=html;
document.getElementById('total').innerText='Total: Rp '+total;
}

function checkout(){
let text='Order:%0A';
let total=0;
cart.forEach(item=>{
text+=`${item.name} - Rp ${item.price}%0A`;
total+=item.price;
});
text+='Total: Rp '+total;
window.open(`https://wa.me/628123456789?text=${text}`);
}

renderProducts();
</script>

</body>
</html>
